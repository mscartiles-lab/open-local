openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Open Local — Florida's local marketplace. Shop Local Wherever You Are.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: vendors
    description: Vendor (producer / maker) operations
  - name: products
    description: Product listing operations
  - name: discovery
    description: Marketplace discovery, stats and aggregates
  - name: feed
    description: Real-time local feed (Local Near Me Now, batch drops, surplus, pre-orders)
  - name: auth
    description: Email verification for vendor onboarding
  - name: establishments
    description: Independently-owned local establishments pinned on the map
  - name: listings
    description: Community classifieds — wanted services and service offerings
  - name: events
    description: Community events — local gatherings, markets, pop-ups, and workshops
  - name: insights
    description: Search demand analytics and vendor recruitment signals

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /vendors:
    get:
      operationId: listVendors
      tags: [vendors]
      summary: List vendors
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: location
          schema: { type: string }
        - in: query
          name: featured
          schema: { type: boolean }
      responses:
        "200":
          description: List of vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"
    post:
      operationId: createVendor
      tags: [vendors]
      summary: Create a vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorInput"
      responses:
        "201":
          description: Vendor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/featured:
    get:
      operationId: listFeaturedVendors
      tags: [vendors, discovery]
      summary: Featured vendors
      responses:
        "200":
          description: Featured vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"

  /vendors/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    get:
      operationId: getVendor
      tags: [vendors]
      summary: Get a vendor
      responses:
        "200":
          description: Vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateVendor
      tags: [vendors]
      summary: Update a vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteVendor
      tags: [vendors]
      summary: Delete a vendor
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vendors/{id}/products:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    get:
      operationId: listVendorProducts
      tags: [vendors, products]
      summary: List products for a vendor
      responses:
        "200":
          description: Vendor products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: vendorId
          schema: { type: integer }
        - in: query
          name: featured
          schema: { type: boolean }
        - in: query
          name: inStock
          schema: { type: boolean }
      responses:
        "200":
          description: List of products with vendor info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductWithVendor"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/featured:
    get:
      operationId: listFeaturedProducts
      tags: [products, discovery]
      summary: Featured products
      responses:
        "200":
          description: Featured products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductWithVendor"

  /products/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductWithVendor"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getMarketplaceStats
      tags: [discovery]
      summary: Marketplace overview stats
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceStats"

  /locations:
    get:
      operationId: listLocations
      tags: [discovery]
      summary: All locations with vendor counts
      responses:
        "200":
          description: Locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LocationCount"

  /categories:
    get:
      operationId: listCategories
      tags: [discovery]
      summary: All categories with vendor and product counts
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryBreakdown"

  /vendors/by-slug/{slug}:
    get:
      operationId: getVendorBySlug
      tags: [vendors]
      summary: Get a vendor by URL slug (used by the vendor dashboard)
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Vendor
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Vendor" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/email/start:
    post:
      operationId: startEmailVerification
      tags: [auth]
      summary: Start email verification for a new vendor listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartEmailVerificationRequest"
      responses:
        "201":
          description: Verification started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartEmailVerificationResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "502":
          description: Email provider error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/email/resend:
    post:
      operationId: resendEmailVerification
      tags: [auth]
      summary: Resend the verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendEmailVerificationRequest"
      responses:
        "200":
          description: Resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartEmailVerificationResponse"
        "400":
          description: Invalid
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/email/verify:
    post:
      operationId: verifyEmailCode
      tags: [auth]
      summary: Verify the 6-digit code and create the vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailRequest"
      responses:
        "201":
          description: Verified and vendor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
        "400":
          description: Invalid or expired code
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "429":
          description: Too many attempts
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /feed/local-now:
    get:
      operationId: getLocalNowFeed
      tags: [feed]
      summary: Real-time local feed grouped by listing type
      description: Batch drops, surplus rescue, and pre-orders currently available.
      responses:
        "200":
          description: Local Near Me Now feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalNowFeed"

  /establishments:
    get:
      operationId: listEstablishments
      tags: [establishments]
      summary: List active pinned establishments
      parameters:
        - in: query
          name: state
          schema: { type: string }
          description: Filter by US state code (e.g. FL)
        - in: query
          name: type
          schema: { type: string }
          description: Filter by establishment type
      responses:
        "200":
          description: List of active establishments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Establishment"

  /establishments/submit:
    post:
      operationId: submitEstablishment
      tags: [establishments]
      summary: Submit an establishment for map pinning
      description: Creates a pending establishment record. Free during trial period.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstablishmentInput"
      responses:
        "201":
          description: Submission received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Establishment"
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /establishments/{id}:
    patch:
      operationId: updateEstablishment
      tags: [establishments]
      summary: Admin — approve or reject an establishment
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstablishmentUpdate"
      responses:
        "200":
          description: Updated establishment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Establishment"
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /search-logs:
    post:
      operationId: logSearch
      tags: [insights]
      summary: Record a search query for demand analytics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchLogInput"
      responses:
        "204":
          description: Logged

  /search-insights:
    get:
      operationId: getSearchInsights
      tags: [insights]
      summary: Aggregated search demand data for vendor recruitment
      responses:
        "200":
          description: Search insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchInsights"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List community events
      parameters:
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: city
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: upcoming
          schema: { type: boolean }
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventItem"
    post:
      operationId: createEvent
      tags: [events]
      summary: Submit a community event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventItem"
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /listings:
    get:
      operationId: listListings
      tags: [listings]
      summary: List community classifieds
      parameters:
        - in: query
          name: type
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: city
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
      responses:
        "200":
          description: List of listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ListingItem"
    post:
      operationId: createListing
      tags: [listings]
      summary: Post a new community listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingInput"
      responses:
        "201":
          description: Created listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingItem"
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error: { type: string }
      required: [error]

    Vendor:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        tagline: { type: string }
        description: { type: string }
        category: { type: string }
        location: { type: string }
        region: { type: string }
        contactEmail: { type: string }
        websiteUrl: { type: ["string", "null"] }
        imageUrl: { type: string }
        established: { type: integer }
        featured: { type: boolean }
        phone: { type: ["string", "null"] }
        instagramHandle: { type: ["string", "null"] }
        facebookUrl: { type: ["string", "null"] }
        marketsText: { type: ["string", "null"] }
        latitude: { type: ["number", "null"] }
        longitude: { type: ["number", "null"] }
        createdAt: { type: string, format: date-time }
      required:
        - id
        - name
        - slug
        - tagline
        - description
        - category
        - location
        - region
        - contactEmail
        - websiteUrl
        - imageUrl
        - established
        - featured
        - phone
        - instagramHandle
        - facebookUrl
        - marketsText
        - latitude
        - longitude
        - createdAt

    VendorInput:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        tagline: { type: string }
        description: { type: string }
        category: { type: string }
        location: { type: string }
        region: { type: string }
        contactEmail: { type: string }
        websiteUrl: { type: ["string", "null"] }
        imageUrl: { type: string }
        established: { type: integer }
        featured: { type: boolean }
        phone: { type: ["string", "null"] }
        instagramHandle: { type: ["string", "null"] }
        facebookUrl: { type: ["string", "null"] }
        marketsText: { type: ["string", "null"] }
        latitude: { type: ["number", "null"] }
        longitude: { type: ["number", "null"] }
      required:
        - name
        - slug
        - tagline
        - description
        - category
        - location
        - region
        - contactEmail
        - imageUrl
        - established

    VendorUpdate:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        tagline: { type: string }
        description: { type: string }
        category: { type: string }
        location: { type: string }
        region: { type: string }
        contactEmail: { type: string }
        websiteUrl: { type: ["string", "null"] }
        imageUrl: { type: string }
        established: { type: integer }
        featured: { type: boolean }
        phone: { type: ["string", "null"] }
        instagramHandle: { type: ["string", "null"] }
        facebookUrl: { type: ["string", "null"] }
        marketsText: { type: ["string", "null"] }
        latitude: { type: ["number", "null"] }
        longitude: { type: ["number", "null"] }

    ListingType:
      type: string
      enum: [regular, batch_drop, surplus, pre_order]
      description: regular = standard storefront product. batch_drop = small fresh batch just released. surplus = market-leftover discount. pre_order = reserve for upcoming market pickup.

    Product:
      type: object
      properties:
        id: { type: integer }
        vendorId: { type: integer }
        name: { type: string }
        description: { type: string }
        priceCents: { type: integer }
        unit: { type: string }
        category: { type: string }
        imageUrl: { type: string }
        inStock: { type: boolean }
        featured: { type: boolean }
        listingType: { $ref: "#/components/schemas/ListingType" }
        originalPriceCents: { type: ["integer", "null"] }
        availableUntil: { type: ["string", "null"], format: date-time }
        pickupNote: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
      required:
        - id
        - vendorId
        - name
        - description
        - priceCents
        - unit
        - category
        - imageUrl
        - inStock
        - featured
        - listingType
        - originalPriceCents
        - availableUntil
        - pickupNote
        - createdAt

    ProductWithVendor:
      type: object
      properties:
        id: { type: integer }
        vendorId: { type: integer }
        name: { type: string }
        description: { type: string }
        priceCents: { type: integer }
        unit: { type: string }
        category: { type: string }
        imageUrl: { type: string }
        inStock: { type: boolean }
        featured: { type: boolean }
        listingType: { $ref: "#/components/schemas/ListingType" }
        originalPriceCents: { type: ["integer", "null"] }
        availableUntil: { type: ["string", "null"], format: date-time }
        pickupNote: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        vendorName: { type: string }
        vendorSlug: { type: string }
        vendorLocation: { type: string }
        vendorCategory: { type: string }
      required:
        - id
        - vendorId
        - name
        - description
        - priceCents
        - unit
        - category
        - imageUrl
        - inStock
        - featured
        - listingType
        - originalPriceCents
        - availableUntil
        - pickupNote
        - createdAt
        - vendorName
        - vendorSlug
        - vendorLocation
        - vendorCategory

    ProductInput:
      type: object
      properties:
        vendorId: { type: integer }
        name: { type: string }
        description: { type: string }
        priceCents: { type: integer }
        unit: { type: string }
        category: { type: string }
        imageUrl: { type: string }
        inStock: { type: boolean }
        featured: { type: boolean }
        listingType: { $ref: "#/components/schemas/ListingType" }
        originalPriceCents: { type: ["integer", "null"] }
        availableUntil: { type: ["string", "null"], format: date-time }
        pickupNote: { type: ["string", "null"] }
      required:
        - vendorId
        - name
        - description
        - priceCents
        - unit
        - category
        - imageUrl

    ProductUpdate:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        priceCents: { type: integer }
        unit: { type: string }
        category: { type: string }
        imageUrl: { type: string }
        inStock: { type: boolean }
        featured: { type: boolean }
        listingType: { $ref: "#/components/schemas/ListingType" }
        originalPriceCents: { type: ["integer", "null"] }
        availableUntil: { type: ["string", "null"], format: date-time }
        pickupNote: { type: ["string", "null"] }

    MarketplaceStats:
      type: object
      properties:
        vendorCount: { type: integer }
        productCount: { type: integer }
        locationCount: { type: integer }
        categoryCount: { type: integer }
        inStockCount: { type: integer }
        featuredVendorCount: { type: integer }
      required:
        - vendorCount
        - productCount
        - locationCount
        - categoryCount
        - inStockCount
        - featuredVendorCount

    LocationCount:
      type: object
      properties:
        location: { type: string }
        region: { type: string }
        vendorCount: { type: integer }
      required: [location, region, vendorCount]

    CategoryCount:
      type: object
      properties:
        name: { type: string }
        count: { type: integer }
      required: [name, count]

    StartEmailVerificationRequest:
      type: object
      properties:
        email: { type: string, format: email }
        vendorPayload: { $ref: "#/components/schemas/VendorInput" }
      required: [email, vendorPayload]

    StartEmailVerificationResponse:
      type: object
      properties:
        verificationId: { type: integer }
        email: { type: string }
        expiresAt: { type: string, format: date-time }
        devFallback: { type: boolean }
        devCode: { type: ["string", "null"] }
      required: [verificationId, email, expiresAt, devFallback, devCode]

    ResendEmailVerificationRequest:
      type: object
      properties:
        verificationId: { type: integer }
      required: [verificationId]

    VerifyEmailRequest:
      type: object
      properties:
        verificationId: { type: integer }
        code: { type: string, pattern: "^[0-9]{6}$" }
      required: [verificationId, code]

    LocalNowFeed:
      type: object
      properties:
        batchDrops:
          type: array
          items:
            $ref: "#/components/schemas/ProductWithVendor"
        surplus:
          type: array
          items:
            $ref: "#/components/schemas/ProductWithVendor"
        preOrders:
          type: array
          items:
            $ref: "#/components/schemas/ProductWithVendor"
      required: [batchDrops, surplus, preOrders]

    CategoryBreakdown:
      type: object
      properties:
        vendorCategories:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
        productCategories:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
      required: [vendorCategories, productCategories]

    Establishment:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        type: { type: string }
        description: { type: string }
        address: { type: string }
        city: { type: string }
        state: { type: string }
        latitude: { type: ["number", "null"] }
        longitude: { type: ["number", "null"] }
        phone: { type: ["string", "null"] }
